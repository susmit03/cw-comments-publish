bundle:
  name: comment-promotion-app

variables:
  sql_warehouse_id:
    description: SQL warehouse ID used by the app for all queries
    default: 30753495d5d39cb1

resources:
  apps:
    comment_promotion_app:
      name: comment-promotion
      description: Approve and apply UC comments DEV -> UAT -> PROD (demo)
      source_code_path: ./
      # On-behalf-of-user auth: the app acts as the signed-in user for all SQL.
      user_api_scopes:
        - sql
      resources:
        - name: sql-warehouse
          description: Warehouse the app uses for all SQL
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-serverless-stable-0a20zk.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://fevm-serverless-stable-0a20zk.cloud.databricks.com
